<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Cameras</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

        :root {
            --bg: #080808;
            --panel: #101010;
            --panel-2: #151515;
            --line: #2f2f2f;
            --line-strong: #eaeaea;
            --text: #f2f2f2;
            --text-dim: #a8a8a8;
            --danger: #d8d8d8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(1200px 600px at 20% -5%, #1a1a1a 0%, var(--bg) 55%);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            padding: 12px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 auto 8px;
            width: 100%;
            max-width: 1600px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: linear-gradient(180deg, #121212 0%, #0d0d0d 100%);
            flex: 0 0 auto;
        }

        .brand {
            font-size: 18px;
            color: var(--text);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .meta-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chip {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            padding: 6px 9px;
            border: 1px solid #4b4b4b;
            border-radius: 999px;
            color: #d8d8d8;
            background: #111;
        }

        .chip strong {
            color: #fff;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 8px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }
        
        .camera {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, #111 0%, #0b0b0b 100%);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.45);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        .camera:hover {
            border-color: #6d6d6d;
            transform: translateY(-1px);
        }
        
        .camera-header {
            background: var(--panel-2);
            padding: 10px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .camera-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        
        .status {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #5c5c5c;
        }
        
        .status.connected {
            background: #f8f8f8;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
        }
        
        .stream-container {
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
        }
        
        .stream-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .recording-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #fff;
            color: #000;
            border: 1px solid #000;
            padding: 4px 7px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 4px;
            letter-spacing: 0.06em;
            animation: rec-blink 0.9s ease-in-out infinite;
            z-index: 3;
        }

        @keyframes rec-blink {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }
        
        .loading {
            color: var(--text-dim);
            font-size: 12px;
            position: absolute;
        }
        
        .fullscreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }
        
        .fullscreen.active {
            display: flex;
        }
        
        .fs-header {
            background: var(--panel-2);
            padding: 15px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .fs-title {
            font-size: 24px;
            color: var(--text);
            font-weight: 600;
        }
        
        .fs-close {
            background: #fff;
            color: #000;
            border: 1px solid #fff;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
        }
        
        .fs-stream {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }
        
        .fs-stream img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .button-row {
            background: var(--panel-2);
            padding: 10px;
            border-top: 1px solid var(--line);
            display: flex;
            gap: 10px;
            justify-content: center;
            flex: 0 0 auto;
        }

        .main-toolbar {
            max-width: 1000px;
            margin: 0 auto 8px;
            width: 100%;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--panel);
            justify-content: space-between;
        }
        
        .nav-btn {
            background: transparent;
            color: var(--text);
            border: 1px solid #585858;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.02em;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
        
        .camera-controls {
            display: flex;
            gap: 5px;
            padding: 5px;
            background: var(--panel-2);
            border-top: 1px solid var(--line);
        }
        
        .record-btn {
            flex: 1;
            background: transparent;
            border: 1px solid #585858;
            color: var(--text);
            padding: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'IBM Plex Mono', monospace;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .record-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
        
        .record-btn.recording {
            background: #fff;
            border-color: #fff;
            color: #000;
        }

        .panel {
            max-width: 1000px;
            margin: 0 auto 8px;
            border: 1px solid var(--line);
            background: var(--panel);
            padding: 8px;
            width: 100%;
            flex: 0 0 auto;
            border-radius: 10px;
        }

        .panel-title {
            font-weight: 600;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .panel-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .field {
            background: #0d0d0d;
            color: var(--text);
            border: 1px solid #3a3a3a;
            padding: 7px;
            min-width: 220px;
            flex: 1;
            font-family: 'IBM Plex Mono', monospace;
            border-radius: 8px;
        }

        .field::placeholder {
            color: #7a7a7a;
        }

        .danger-btn {
            flex: 1;
            background: transparent;
            border: 1px solid #585858;
            color: #d9d9d9;
            padding: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'IBM Plex Mono', monospace;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .danger-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .msg {
            max-width: 1000px;
            margin: 0 auto 8px;
            min-height: 16px;
            color: #dcdcdc;
            width: 100%;
            flex: 0 0 auto;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
        }

        .msg.error {
            color: #f5f5f5;
        }

        .compact-text {
            font-size: 12px;
        }

        @media (max-height: 900px) {
            .topbar { padding: 8px 10px; }
            .brand { font-size: 16px; }
            .panel { padding: 6px; margin-bottom: 6px; }
            .field { padding: 6px; }
            .button-row { padding: 6px; }
            .camera-header { padding: 6px; }
            .camera-controls { padding: 4px; }
        }

        @media (max-width: 900px) {
            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">CCTV Viewer</div>
        <div class="meta-row">
            <div class="chip">Cameras: <strong id="camera-count">0</strong></div>
            <div class="chip">Online: <strong id="online-count">0</strong></div>
            <div class="chip">Time: <strong id="clock">--:--:--</strong></div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Add Camera</div>
        <div class="panel-row">
            <input id="camera-name" class="field" placeholder="Camera Name (Example: Front Door)">
            <input id="camera-url" class="field" placeholder="Camera URL (rtsp://... or http://...)">
            <button class="nav-btn" onclick="addCamera()">+ Add Camera</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Recording Folder (Auto)</div>
        <div class="panel-row">
            <input id="recording-path" class="field" readonly>
            <button class="nav-btn" onclick="saveRecordingPath()">Use Desktop Folder</button>
        </div>
    </div>

    <div id="msg" class="msg"></div>
    
    <div class="button-row main-toolbar">
        <button class="nav-btn" onclick="location.reload()">Refresh</button>
        <span class="compact-text" style="color: #cfcfcf; padding: 0 10px;" id="status">Connecting...</span>
    </div>
    
    <div class="grid" id="cameras"></div>
    
    <div class="fullscreen" id="fullscreen">
        <div class="fs-header">
            <div class="fs-title" id="fs-name">Camera</div>
            <button class="fs-close" onclick="closeFullscreen()">Close</button>
        </div>
        <div class="fs-stream">
            <img id="fs-img" src="" alt="Stream">
        </div>
        <div class="button-row">
            <button class="nav-btn" onclick="previousCamera()">Previous</button>
            <button class="nav-btn" onclick="nextCamera()">Next</button>
        </div>
    </div>
    
    <script>
        let cameras = [];
        let currentIndex = -1;
        
        async function loadCameras() {
            try {
                const res = await fetch('/api/cameras');
                cameras = await res.json();
                render();
                const online = cameras.filter(c => c.connected).length;
                document.getElementById('status').textContent = `${online}/${cameras.length} online`;
                document.getElementById('camera-count').textContent = cameras.length;
                document.getElementById('online-count').textContent = online;
            } catch (e) {
                console.error(e);
                document.getElementById('status').textContent = '✗ Error';
            }
        }

        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
        }
        
        function applyGridLayout(count) {
            const grid = document.getElementById('cameras');
            if (!grid) return;

            if (!count) {
                grid.style.gridTemplateColumns = 'repeat(1, minmax(0, 1fr))';
                grid.style.gridTemplateRows = 'repeat(1, minmax(0, 1fr))';
                return;
            }

            const area = grid.getBoundingClientRect();
            const ratio = area.width / Math.max(area.height, 1);
            const preferredTileRatio = 16 / 9;

            let bestCols = 1;
            let bestRows = count;
            let bestScore = Infinity;

            for (let cols = 1; cols <= count; cols++) {
                const rows = Math.ceil(count / cols);
                const tileW = area.width / cols;
                const tileH = area.height / rows;
                const tileRatio = tileW / Math.max(tileH, 1);
                const ratioPenalty = Math.abs(tileRatio - preferredTileRatio);
                const emptyPenalty = (cols * rows - count) * 0.25;
                const shapePenalty = Math.abs((cols / rows) - ratio) * 0.2;
                const score = ratioPenalty + emptyPenalty + shapePenalty;
                if (score < bestScore) {
                    bestScore = score;
                    bestCols = cols;
                    bestRows = rows;
                }
            }

            grid.style.gridTemplateColumns = `repeat(${bestCols}, minmax(0, 1fr))`;
            grid.style.gridTemplateRows = `repeat(${bestRows}, minmax(0, 1fr))`;
        }

        function render() {
            const grid = document.getElementById('cameras');
            grid.innerHTML = '';
            
            cameras.forEach((cam, idx) => {
                const div = document.createElement('div');
                div.className = 'camera';
                
                div.innerHTML = `
                    <div class="camera-header">
                        <div class="camera-name">${cam.name}</div>
                        <div class="status ${cam.connected ? 'connected' : ''}"></div>
                    </div>
                    <div class="stream-container" onclick="event.stopPropagation(); openFullscreen(${idx})">
                        <img src="/api/stream/${cam.id}?t=${Date.now()}" alt="${cam.name}" onerror="this.style.display='none'">
                        ${cam.recording ? '<div class="recording-badge">REC</div>' : ''}
                    </div>
                    <div class="camera-controls">
                        <button class="record-btn ${cam.recording ? 'recording' : ''}" onclick="event.stopPropagation(); toggleRecord(${cam.id})">
                            ${cam.recording ? 'STOP' : 'REC'}
                        </button>
                        <button class="danger-btn" onclick="event.stopPropagation(); deleteCamera(${cam.id})">DELETE</button>
                    </div>
                `;
                
                grid.appendChild(div);
            });

            applyGridLayout(cameras.length);
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                document.getElementById('recording-path').value = data.recordings || '';
            } catch (e) {
                console.error(e);
            }
        }

        function showMsg(text, isError = false) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = isError ? 'msg error' : 'msg';
        }

        async function addCamera() {
            const nameInput = document.getElementById('camera-name');
            const urlInput = document.getElementById('camera-url');
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();

            if (!name || !url) {
                showMsg('Enter camera name and URL.', true);
                return;
            }

            try {
                const res = await fetch('/api/cameras', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, url})
                });
                const data = await res.json();
                if (!res.ok) {
                    showMsg(data.error || 'Failed to add camera.', true);
                    return;
                }
                nameInput.value = '';
                urlInput.value = '';
                showMsg('Camera added.');
                await loadCameras();
            } catch (e) {
                console.error(e);
                showMsg('Failed to add camera.', true);
            }
        }

        async function deleteCamera(camId) {
            if (!confirm('Delete this camera?')) {
                return;
            }

            try {
                const res = await fetch(`/api/cameras/${camId}`, { method: 'DELETE' });
                if (!res.ok) {
                    const data = await res.json();
                    showMsg(data.error || 'Failed to delete camera.', true);
                    return;
                }
                showMsg('Camera deleted.');
                await loadCameras();
            } catch (e) {
                console.error(e);
                showMsg('Failed to delete camera.', true);
            }
        }

        async function saveRecordingPath() {
            try {
                const res = await fetch('/api/settings/recordings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                const data = await res.json();
                if (!res.ok) {
                    showMsg(data.error || 'Failed to save folder.', true);
                    return;
                }
                document.getElementById('recording-path').value = data.recordings || '';
                showMsg(`Recording folder saved: ${data.recordings}`);
            } catch (e) {
                console.error(e);
                showMsg('Failed to save folder.', true);
            }
        }
        
        async function toggleRecord(camId) {
            const action = cameras.find(c => c.id === camId)?.recording ? 'stop' : 'start';
            try {
                await fetch(`/api/record/${camId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action})
                });
                loadCameras();
            } catch (e) {
                console.error(e);
            }
        }
        
        function openFullscreen(idx) {
            currentIndex = idx;
            const cam = cameras[idx];
            document.getElementById('fs-name').textContent = cam.name;
            document.getElementById('fs-img').src = `/api/stream/${cam.id}?t=${Date.now()}`;
            document.getElementById('fullscreen').classList.add('active');
        }
        
        function closeFullscreen() {
            document.getElementById('fullscreen').classList.remove('active');
            currentIndex = -1;
        }
        
        function previousCamera() {
            if (cameras.length === 0) return;
            currentIndex = (currentIndex - 1 + cameras.length) % cameras.length;
            openFullscreen(currentIndex);
        }
        
        function nextCamera() {
            if (cameras.length === 0) return;
            currentIndex = (currentIndex + 1) % cameras.length;
            openFullscreen(currentIndex);
        }
        
        loadSettings();
        loadCameras();
        updateClock();
        setInterval(loadCameras, 5000);
        setInterval(updateClock, 1000);
        window.addEventListener('resize', () => applyGridLayout(cameras.length));
    </script>
</body>
</html>
